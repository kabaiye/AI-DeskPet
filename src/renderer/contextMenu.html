<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Context Menu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            -webkit-app-region: no-drag;
        }

        .context-menu {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            padding: 8px 0;
            min-width: 180px;
            max-height: 80vh;
            overflow-y: auto;
            -webkit-app-region: no-drag;
        }


        .context-menu-item {
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            color: #333;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            -webkit-app-region: no-drag;
        }

        .context-menu-item:hover {
            background-color: #f5f5f5;
        }

        .context-menu-item.danger {
            color: #e74c3c;
        }

        .context-menu-item.danger:hover {
            background-color: #fdf2f2;
        }

        .context-menu-separator {
            height: 1px;
            background-color: #eee;
            margin: 4px 0;
        }

        /* 淡出动画 */
        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: scale(1);
            }

            to {
                opacity: 0;
                transform: scale(0.95);
            }
        }

        .fade-out {
            animation: fadeOut 0.3s ease-in forwards;
        }
    </style>
</head>

<body>
    <div class="context-menu" id="contextMenu">
        <div class="context-menu-item" id="openChatWindow">
            <span>💬</span>
            <span id="chatMenuLabel">和桌宠聊天</span>
        </div>
        <div class="context-menu-separator"></div>
        <div class="context-menu-item" id="openMainWindow">
            <span>🏠</span>
            <span>打开主页面</span>
        </div>
        <div class="context-menu-separator"></div>
        <div class="context-menu-item" id="openTodoWindow">
            <span>📝</span>
            <span>待办事项</span>
        </div>
        <div class="context-menu-separator"></div>
        <div class="context-menu-item" id="openDiaryWindow">
            <span>📔</span>
            <span>心情日记</span>
        </div>
        <div class="context-menu-separator"></div>
        <div class="context-menu-item" id="openPetSettings">
            <span>⚙️</span>
            <span>桌宠设置</span>
        </div>
        <div class="context-menu-separator"></div>
        <div class="context-menu-item danger" id="exitApp">
            <span>🚪</span>
            <span>退出应用</span>
        </div>
    </div>

    <script>
        try {
            const { ipcRenderer } = require('electron');
            const openMainWindow = document.getElementById('openMainWindow');
            const openTodoWindow = document.getElementById('openTodoWindow');
            const openPetSettings = document.getElementById('openPetSettings');
            const exitApp = document.getElementById('exitApp');

            (async function loadCharName() {
                try {
                    const c = await ipcRenderer.invoke('get-character-config');
                    if (c && c.ui) {
                        const label = document.getElementById('chatMenuLabel');
                        if (label) label.textContent = c.ui.contextMenuChat.replace(/\{\{name\}\}/g, c.name);
                    }
                } catch (_) {}
            })();

            document.getElementById('openChatWindow').addEventListener('click', () => {
                ipcRenderer.send('open-chat-window');
                window.close();
            });

            openMainWindow.addEventListener('click', () => {
                ipcRenderer.send('open-main-window');
                window.close();
            });

            openTodoWindow.addEventListener('click', () => {
                ipcRenderer.send('open-todo-window');
                window.close();
            });

            document.getElementById('openDiaryWindow').addEventListener('click', () => {
                ipcRenderer.send('open-diary-window');
                window.close();
            });

            openPetSettings.addEventListener('click', () => {
                ipcRenderer.send('open-pet-settings');
                window.close();
            });

            exitApp.addEventListener('click', () => {
                ipcRenderer.send('exit-app');
                window.close();
            });

            document.addEventListener('click', (e) => {
                if (e.target === document.body || !e.target.closest('.context-menu-item')) {
                    window.close();
                }
            });

            window.addEventListener('blur', () => {
                window.close();
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') window.close();
            });

            window.addEventListener('beforeunload', () => {
                try {
                    ipcRenderer.send('context-menu-closed');
                } catch (_) {}
            });

            console.log('Context menu event listeners added successfully');
        } catch (error) {
            console.error('Error in context menu window script:', error);
        }
    </script>
</body>

</html>
