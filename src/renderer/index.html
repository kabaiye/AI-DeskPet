<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>XiaoHeiCat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #e8f4f8 0%, #f0f8ff 50%, #e6f7ff 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: #2c5aa0;
            overflow-y: auto;
        }

        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .floating-cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50px;
            animation: float 6s ease-in-out infinite;
        }

        .cloud-1 { width: 80px; height: 40px; top: 10%; left: 10%; animation-delay: 0s; }
        .cloud-2 { width: 60px; height: 30px; top: 20%; right: 15%; animation-delay: 2s; }
        .cloud-3 { width: 100px; height: 50px; bottom: 20%; left: 20%; animation-delay: 4s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .main-container {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 520px;
            margin: 0 auto;
            padding: 40px 20px 30px;
        }

        .title-section {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        .logo {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
            filter: drop-shadow(0 4px 8px rgba(74, 108, 247, 0.3));
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .title-content { text-align: left; }

        h1 {
            font-size: 26px;
            margin-bottom: 4px;
            color: #2c5aa0;
            font-weight: 700;
        }

        .subtitle {
            font-size: 14px;
            color: #5a7c9a;
        }

        .status-indicator {
            background: linear-gradient(135deg, #4a6cf7 0%, #6b8cff 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 4px 12px rgba(74, 108, 247, 0.25);
            margin-bottom: 28px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .shortcut-card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1.5px solid rgba(74, 108, 247, 0.08);
            box-shadow: 0 6px 20px rgba(74, 108, 247, 0.08);
            padding: 20px 24px;
            text-align: left;
            margin-bottom: 20px;
        }

        .shortcut-card h3 {
            font-size: 15px;
            font-weight: 600;
            color: #2c5aa0;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .shortcut-row {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(74, 108, 247, 0.06);
        }

        .shortcut-row:last-child { border-bottom: none; }

        .shortcut-key {
            display: inline-block;
            min-width: 60px;
            text-align: center;
            background: linear-gradient(135deg, #4a6cf7 0%, #6b8cff 100%);
            color: white;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 6px;
            margin-right: 14px;
            flex-shrink: 0;
            box-shadow: 0 2px 6px rgba(74, 108, 247, 0.2);
        }

        .shortcut-label {
            font-size: 13.5px;
            color: #3d6098;
            flex: 1;
        }

        .shortcut-label .desc {
            color: #8a9fba;
            font-size: 12px;
            margin-left: 6px;
        }

        .tip {
            font-size: 12px;
            color: #8a9fba;
            text-align: center;
            margin-top: 6px;
            line-height: 1.6;
        }

        .tip strong { color: #5a7c9a; font-weight: 500; }
    </style>
</head>

<body>
    <div class="bg-decoration">
        <div class="floating-cloud cloud-1"></div>
        <div class="floating-cloud cloud-2"></div>
        <div class="floating-cloud cloud-3"></div>
    </div>

    <div class="main-container">
        <div class="title-section">
            <img class="logo" id="mainLogo" src="" alt="桌宠" />
            <div class="title-content">
                <h1 id="mainTitle">XiaoHeiCat</h1>
                <p class="subtitle" id="mainSubtitle"></p>
            </div>
        </div>

        <div class="status-indicator" id="mainStatus"></div>

        <div class="shortcut-card">
            <h3>⌨️ 快捷键</h3>
            <div class="shortcut-row">
                <span class="shortcut-key">Alt+F1</span>
                <span class="shortcut-label">快捷聊天 <span class="desc">弹出输入框，快速提问</span></span>
            </div>
            <div class="shortcut-row">
                <span class="shortcut-key">Alt+F2</span>
                <span class="shortcut-label">AI 截图 <span class="desc">截图后可附加问题一起发送</span></span>
            </div>
            <div class="shortcut-row">
                <span class="shortcut-key">Alt+F3</span>
                <span class="shortcut-label" id="pokeLabel">戳一戳 <span class="desc">和桌宠互动，获取随机回应</span></span>
            </div>
            <div class="shortcut-row">
                <span class="shortcut-key">Ctrl+H</span>
                <span class="shortcut-label" id="toggleLabel">显示/隐藏 <span class="desc">切换桌宠的显示状态</span></span>
            </div>
            <div class="shortcut-row">
                <span class="shortcut-key">Ctrl+T</span>
                <span class="shortcut-label">待办清单 <span class="desc">查看和管理待办事项</span></span>
            </div>
            <div class="shortcut-row">
                <span class="shortcut-key">Ctrl+O</span>
                <span class="shortcut-label">打开主界面 <span class="desc">显示本窗口</span></span>
            </div>
        </div>

        <div class="shortcut-card">
            <h3>🐾 交互方式</h3>
            <div class="shortcut-row">
                <span class="shortcut-key">点击</span>
                <span class="shortcut-label" id="clickLabel">点击桌宠触发"戳一戳"，连续点击有不同反应</span>
            </div>
            <div class="shortcut-row">
                <span class="shortcut-key">拖拽</span>
                <span class="shortcut-label" id="dragLabel">按住桌宠拖动到屏幕任意位置</span>
            </div>
            <div class="shortcut-row">
                <span class="shortcut-key">右键</span>
                <span class="shortcut-label">打开菜单，进入聊天、设置等更多功能</span>
            </div>
        </div>

        <p class="tip">快捷键可在 <strong>右键菜单 → 快捷键设置</strong> 中自定义<br>⚠️ 截图请勿包含敏感信息</p>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        (async function initMainPage() {
            try {
                const c = await ipcRenderer.invoke('get-character-config');
                if (c) {
                    const name = c.name;
                    const baseDir = c.assets.baseDir;
                    const defaultImg = c.assets.defaultImage;
                    const ab = c.assetsBasePath;
                    document.getElementById('mainLogo').src = ab ? `file:///${ab}/${baseDir}/${defaultImg}` : `../assets/imgs/${baseDir}/${defaultImg}`;
                    document.getElementById('mainLogo').alt = name;
                    document.getElementById('mainTitle').textContent = c.displayName;
                    document.getElementById('mainSubtitle').textContent = c.subtitle;
                    document.getElementById('mainStatus').textContent = c.statusOnline;
                    document.title = `${c.displayName} - ${c.subtitle.replace(/\s*✨\s*$/, '')}`;

                    const pokeLabel = document.getElementById('pokeLabel');
                    if (pokeLabel) pokeLabel.innerHTML = `戳一戳 <span class="desc">和${name}互动，获取随机回应</span>`;
                    const toggleLabel = document.getElementById('toggleLabel');
                    if (toggleLabel) toggleLabel.innerHTML = `显示/隐藏 <span class="desc">切换${name}的显示状态</span>`;
                    const clickLabel = document.getElementById('clickLabel');
                    if (clickLabel) clickLabel.textContent = `点击${name}触发"戳一戳"，连续点击有不同反应`;
                    const dragLabel = document.getElementById('dragLabel');
                    if (dragLabel) dragLabel.textContent = `按住${name}拖动到屏幕任意位置`;
                }
            } catch (e) {
                console.error('Failed to load character config:', e);
            }
        })();

        document.addEventListener('DOMContentLoaded', () => {
            const rows = document.querySelectorAll('.shortcut-row');
            rows.forEach((el, i) => {
                el.style.opacity = '0';
                el.style.transform = 'translateX(-12px)';
                setTimeout(() => {
                    el.style.transition = 'all 0.35s ease';
                    el.style.opacity = '1';
                    el.style.transform = 'translateX(0)';
                }, i * 50);
            });
        });
    </script>
</body>

</html>
