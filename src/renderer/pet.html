<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>DeskPet</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            -webkit-app-region: drag;
            /* 添加拖动区域 */
        }

        .pet-container {
            cursor: pointer;
            transition: transform 0.2s ease;
            -webkit-app-region: no-drag;
            position: fixed;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 80px;
            height: 80px;
            right: 10px;
            bottom: 10px;
        }

        .pet-container:hover {
            transform: scale(1.1);
        }

        .pet-container:active {
            transform: scale(0.95);
        }

        .pet-image {
            width: 80px;
            height: 80px;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.2));
            border-radius: 50%;
            object-fit: cover;
            pointer-events: none;
            user-select: none;
        }

        /* === 悬浮工具栏 === */
        .pet-toolbar {
            position: fixed;
            top: 6px;
            left: 50%;
            transform: translateX(-50%) translateY(6px);
            display: flex;
            gap: 5px;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.25s ease, transform 0.25s ease;
            pointer-events: none;
            -webkit-app-region: no-drag;
        }

        .pet-toolbar.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }

        .toolbar-btn {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 1.5px solid rgba(0, 0, 0, 0.06);
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            position: relative;
            padding: 0;
        }

        .toolbar-btn:hover {
            transform: scale(1.18);
            background: white;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.18);
        }

        .toolbar-btn:active {
            transform: scale(0.92);
        }

        .toolbar-btn svg {
            width: 11px;
            height: 11px;
        }

        .toolbar-btn .tooltip {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.72);
            color: #fff;
            font-size: 9px;
            padding: 1px 5px;
            border-radius: 3px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.15s ease;
            pointer-events: none;
            font-family: -apple-system, 'Microsoft YaHei', sans-serif;
        }

        .toolbar-btn:hover .tooltip {
            opacity: 1;
        }

        .toolbar-btn.dnd-active {
            background: rgba(255, 140, 0, 0.9);
            border-color: rgba(255, 140, 0, 0.3);
        }

        .toolbar-btn.dnd-active svg {
            stroke: #fff;
        }

        .toolbar-btn.dnd-active:hover {
            background: rgba(255, 120, 0, 1);
        }

        .emoji-bubble {
            position: fixed;
            font-size: 18px;
            pointer-events: none;
            z-index: 5;
            animation: float-up 3s ease-out forwards;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
        }

        @keyframes float-up {
            0% {
                opacity: 0.9;
                transform: translateY(0) scale(0.5) rotate(0deg);
            }
            20% {
                opacity: 1;
                transform: translateY(-15px) scale(1) rotate(-5deg);
            }
            80% {
                opacity: 0.6;
                transform: translateY(-55px) scale(0.9) rotate(8deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-75px) scale(0.7) rotate(-3deg);
            }
        }

        /* 吸附动画 - 暂时注释掉 */
        /*
        @keyframes snap-bounce {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes snap-scale {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        /* 返回动画 */
        @keyframes return-walk {
            0% {
                transform: scale(1) translateX(0);
            }

            25% {
                transform: scale(1.1) translateX(-5px);
            }

            50% {
                transform: scale(1) translateX(0);
            }

            75% {
                transform: scale(1.1) translateX(5px);
            }

            100% {
                transform: scale(1) translateX(0);
            }
        }
    </style>
</head>

<body>
    <div class="pet-toolbar" id="petToolbar">
        <button class="toolbar-btn" id="quickChatBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            <span class="tooltip">快捷提问</span>
        </button>
        <button class="toolbar-btn" id="screenshotBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 3h4"/><path d="M4 3v4"/>
                <path d="M20 3h-4"/><path d="M20 3v4"/>
                <path d="M4 21h4"/><path d="M4 21v-4"/>
                <path d="M20 21h-4"/><path d="M20 21v-4"/>
            </svg>
            <span class="tooltip">截图提问</span>
        </button>
        <button class="toolbar-btn" id="dndBtn">
            <svg class="dnd-icon-off" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
            <svg class="dnd-icon-on" style="display:none" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                <path d="M18.63 13A17.89 17.89 0 0 1 18 8"/>
                <path d="M6.26 6.26A5.86 5.86 0 0 0 6 8c0 7-3 9-3 9h14"/>
                <path d="M18 8a6 6 0 0 0-9.33-5"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
            <span class="tooltip">勿扰模式</span>
        </button>
    </div>

    <div class="pet-container" id="pet">
        <img class="pet-image" id="petImage" src="" alt="桌宠" />
    </div>



    <script>
        const pet = document.getElementById('pet');
        const petImage = document.getElementById('petImage');
        const petToolbar = document.getElementById('petToolbar');
        const { ipcRenderer: petIpc } = require('electron');

        // === 悬浮工具栏逻辑 ===
        let toolbarHideTimer = null;

        function showToolbar() {
            clearTimeout(toolbarHideTimer);
            petToolbar.classList.add('visible');
        }

        function hideToolbar(delay = 400) {
            clearTimeout(toolbarHideTimer);
            toolbarHideTimer = setTimeout(() => {
                petToolbar.classList.remove('visible');
            }, delay);
        }

        document.addEventListener('mouseenter', () => showToolbar());
        document.addEventListener('mouseleave', () => hideToolbar(300));

        petToolbar.addEventListener('mouseenter', () => showToolbar());
        petToolbar.addEventListener('mouseleave', () => hideToolbar(300));

        document.getElementById('quickChatBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            e.preventDefault();
            petIpc.send('toolbar-quick-chat');
        });

        document.getElementById('screenshotBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            e.preventDefault();
            petIpc.send('toolbar-screenshot');
        });

        const dndBtn = document.getElementById('dndBtn');
        const dndIconOff = dndBtn.querySelector('.dnd-icon-off');
        const dndIconOn = dndBtn.querySelector('.dnd-icon-on');
        let isDnd = false;

        function updateDndUI(active) {
            isDnd = active;
            dndIconOff.style.display = active ? 'none' : '';
            dndIconOn.style.display = active ? '' : 'none';
            dndBtn.classList.toggle('dnd-active', active);
        }

        dndBtn.addEventListener('click', async (e) => {
            e.stopPropagation();
            e.preventDefault();
            const newState = await petIpc.invoke('toggle-dnd');
            updateDndUI(newState);
        });
        dndBtn.addEventListener('mousedown', (e) => e.stopPropagation());

        petIpc.invoke('load-settings').then(s => {
            if (s) updateDndUI(!!s.doNotDisturb);
        });

        document.getElementById('quickChatBtn').addEventListener('mousedown', (e) => e.stopPropagation());
        document.getElementById('screenshotBtn').addEventListener('mousedown', (e) => e.stopPropagation());

        let emotionMap = {};
        let emotionOpaqueMap = {};
        let charAssets = null;
        let assetsBase = '';

        function assetPath(filename) {
            const baseDir = charAssets ? charAssets.baseDir : '罗小黑';
            if (assetsBase) return `file:///${assetsBase}/${baseDir}/${filename}`;
            return `../assets/imgs/${baseDir}/${filename}`;
        }

        function applyOpaque(opaque) {
            petImage.style.backgroundColor = opaque ? 'white' : 'transparent';
        }

        (async function initCharacter() {
            try {
                const charConfig = await petIpc.invoke('get-character-config');
                if (charConfig && charConfig.assets) {
                    charAssets = charConfig.assets;
                    assetsBase = charConfig.assetsBasePath || '';
                    emotionMap = {};
                    emotionOpaqueMap = {};
                    for (const [emotion, value] of Object.entries(charAssets.emotions)) {
                        if (emotion.startsWith('_')) continue;
                        if (typeof value === 'string') {
                            emotionMap[emotion] = assetPath(value);
                            emotionOpaqueMap[emotion] = false;
                        } else {
                            emotionMap[emotion] = assetPath(value.file);
                            emotionOpaqueMap[emotion] = !!value.opaque;
                        }
                    }
                }
            } catch (e) {
                console.error('Failed to load character config:', e);
            }
            updateDefaultEmotion();
        })();

        function updateDefaultEmotion() {
            const now = new Date();
            const hour = now.getHours();
            const nightImg = charAssets ? charAssets.idleNightImage : '困死了.gif';
            const defaultImg = charAssets ? charAssets.defaultImage : 'pet.gif';

            if (hour >= 20) {
                petImage.src = assetPath(nightImg);
                applyOpaque(charAssets && !!charAssets.idleNightImageOpaque);
            } else {
                petImage.src = assetPath(defaultImg);
                applyOpaque(charAssets && !!charAssets.defaultImageOpaque);
            }
        }

        function changeEmotion(emotion) {
            if (emotionMap[emotion]) {
                petImage.src = emotionMap[emotion];
                applyOpaque(emotionOpaqueMap[emotion]);
                console.log('切换到表情:', emotion);
            } else {
                console.log('未知表情:', emotion);
            }
        }

        // 初始化时设置默认表情
        updateDefaultEmotion();

        // 右键菜单功能
        let contextMenuTimeout = null;
        pet.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            e.stopPropagation();

            // 防抖：清除之前的超时
            if (contextMenuTimeout) {
                clearTimeout(contextMenuTimeout);
            }

            // 延迟发送，避免快速连续点击
            contextMenuTimeout = setTimeout(() => {
                try {
                    console.log('Sending context menu request');
                    require('electron').ipcRenderer.send('show-context-menu', e.screenX, e.screenY);
                } catch (error) {
                    console.error('Error showing context menu:', error);
                }
            }, 50);
        });

        // 拖拽相关变量
        let isMouseDown = false;
        let isDragActive = false;
        let startScreenX = 0, startScreenY = 0;
        let clickOffsetX = 0, clickOffsetY = 0;
        const DRAG_DEAD_ZONE = 5; // 移动超过5px才算拖拽

        pet.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return;
            e.preventDefault();

            isMouseDown = true;
            isDragActive = false;
            startScreenX = e.screenX;
            startScreenY = e.screenY;
            clickOffsetX = e.clientX;
            clickOffsetY = e.clientY;
        });

        document.addEventListener('mousemove', (e) => {
            if (!isMouseDown) return;

            const dx = e.screenX - startScreenX;
            const dy = e.screenY - startScreenY;

            if (!isDragActive && (Math.abs(dx) > DRAG_DEAD_ZONE || Math.abs(dy) > DRAG_DEAD_ZONE)) {
                isDragActive = true;
                pet.style.cursor = 'grabbing';
                try {
                    require('electron').ipcRenderer.send('drag-start', {
                        offsetX: clickOffsetX,
                        offsetY: clickOffsetY
                    });
                } catch (error) {
                    console.error('drag-start failed:', error);
                }
            }
        });

        document.addEventListener('mouseup', () => {
            if (!isMouseDown) return;
            isMouseDown = false;

            if (isDragActive) {
                isDragActive = false;
                pet.style.cursor = 'pointer';
                try {
                    require('electron').ipcRenderer.send('drag-end');
                } catch (error) {
                    console.error('drag-end failed:', error);
                }
            } else {
                try {
                    require('electron').ipcRenderer.send('pet-clicked');
                } catch (error) {
                    console.error('pet-clicked failed:', error);
                }
            }
        });

        pet.addEventListener('selectstart', (e) => e.preventDefault());

        // 监听窗口位置更新（保留用于其他功能）
        const { ipcRenderer } = require('electron');
        ipcRenderer.on('pet-window-position', (event, x, y) => {
            // 保留此监听器用于其他功能，但不再用于拖动
        });

        // 监听边缘吸附完成事件 - 暂时注释掉
        /*
        ipcRenderer.on('snap-completed', (event, x, y, snapType, shouldFlip) => {
            console.log('边缘吸附完成:', x, y, snapType, shouldFlip);

            // 处理翻转
            if (shouldFlip) {
                isFlipped = true;
                pet.style.transform = 'scaleY(-1)';
                console.log('宠物已翻转（吸附到顶部）');
            } else {
                isFlipped = false;
            }

            // 添加吸附完成的视觉反馈和动画
            pet.style.transform = shouldFlip ? 'scale(1.1) scaleY(-1)' : 'scale(1.1)';
            pet.style.transition = 'transform 0.2s ease-out';

            // 吸附动画效果 - 只进行屏幕边缘吸附
            pet.style.animation = 'snap-scale 0.4s ease-out';

            setTimeout(() => {
                pet.style.transform = shouldFlip ? 'scale(1) scaleY(-1)' : 'scale(1)';
                pet.style.transition = 'transform 0.1s ease-in';
                pet.style.animation = '';
            }, 200);
        });
        */

        // 监听返回原位置事件 - 暂时注释掉
        /*
        ipcRenderer.on('return-to-original', (event) => {
            console.log('开始返回原位置');

            // 重置翻转状态
            if (isFlipped) {
                isFlipped = false;
                pet.style.transform = 'scale(1)';
            }

            // 添加返回动画效果
            pet.style.animation = 'return-walk 1s ease-in-out';
        });

        // 监听返回完成事件
        ipcRenderer.on('return-completed', (event) => {
            console.log('返回原位置完成');

            // 清除动画
            pet.style.animation = '';
        });
        */





        // 监听表情切换事件
        try {
            require('electron').ipcRenderer.on('change-emotion', (event, emotion) => {
                changeEmotion(emotion);
            });
        } catch (error) {
            console.error('Error setting up emotion listener:', error);
        }

        // 监听状态复原事件
        try {
            require('electron').ipcRenderer.on('reset-emotion', (event) => {
                console.log('收到状态复原信号，恢复初始状态');
                updateDefaultEmotion();
            });
        } catch (error) {
            console.error('Error setting up reset emotion listener:', error);
        }

        // === 表情气泡功能 ===
        const EMOJI_POOLS = {
            morning: ['☀️', '🌅', '☕', '🥐', '🌤️', '🐦', '🌻', '💪'],
            afternoon: ['📝', '🎵', '🌸', '💻', '🍵', '🌈', '✨', '🎯'],
            evening: ['🌙', '🌟', '🎮', '📖', '🍕', '🎧', '💫', '🌆'],
            night: ['😴', '💤', '🌙', '⭐', '🛏️', '🧸', '🌌', '💭'],
            fun: ['🎈', '🎉', '🦋', '🍀', '🎶', '🌈', '💖', '🐾', '🎪', '🧩', '🪄', '✨']
        };

        function getEmojiPool() {
            const hour = new Date().getHours();
            if (hour >= 5 && hour < 12) return [...EMOJI_POOLS.morning, ...EMOJI_POOLS.fun];
            if (hour >= 12 && hour < 18) return [...EMOJI_POOLS.afternoon, ...EMOJI_POOLS.fun];
            if (hour >= 18 && hour < 22) return [...EMOJI_POOLS.evening, ...EMOJI_POOLS.fun];
            return [...EMOJI_POOLS.night, ...EMOJI_POOLS.fun];
        }

        function showEmojiBubble() {
            const pool = getEmojiPool();
            const emoji = pool[Math.floor(Math.random() * pool.length)];

            const el = document.createElement('div');
            el.className = 'emoji-bubble';
            el.textContent = emoji;

            const offsetX = Math.random() * 60 - 30;
            el.style.left = `${50 + offsetX}px`;
            el.style.bottom = '70px';

            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3200);
        }

        try {
            require('electron').ipcRenderer.on('show-emoji-bubble', () => {
                showEmojiBubble();
                const extraCount = Math.random() < 0.3 ? 1 : 0;
                for (let i = 0; i < extraCount; i++) {
                    setTimeout(() => showEmojiBubble(), 600 + Math.random() * 800);
                }
            });
        } catch (error) {
            console.error('Error setting up emoji bubble listener:', error);
        }

        console.log('Pet with drag and emotion support loaded');
    </script>
</body>

</html>
