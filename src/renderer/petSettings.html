<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桌宠设置</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #e8f4f8 0%, #f0f8ff 50%, #e6f7ff 100%);
            color: #2c5aa0;
            height: 100vh;
            overflow: hidden;
            width: 100vw;
            border-radius: 10px;
            border: 1px solid rgba(74, 108, 247, 0.1);
            box-shadow: 0 4px 30px rgba(74, 108, 247, 0.15);
            user-select: none;
        }

        .settings-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-radius: 10px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4a6cf7 0%, #6b8cff 100%);
            color: white;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            -webkit-app-region: drag;
            box-shadow: 0 2px 10px rgba(74, 108, 247, 0.2);
            flex-shrink: 0;
        }

        .header h1 { margin: 0; font-size: 17px; font-weight: 600; }

        .close-button {
            width: 28px; height: 28px;
            background: rgba(255, 255, 255, 0.2);
            border: none; border-radius: 50%;
            color: white; font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease;
            -webkit-app-region: no-drag;
        }
        .close-button:hover { background: rgba(255, 255, 255, 0.3); transform: scale(1.1); }

        .content {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            -webkit-app-region: no-drag;
        }

        /* ====== 折叠面板 ====== */
        .section {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 14px;
            margin-bottom: 14px;
            border: 1.5px solid rgba(74, 108, 247, 0.06);
            box-shadow: 0 3px 14px rgba(74, 108, 247, 0.07);
            overflow: hidden;
        }

        .section-header {
            padding: 13px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .section-header:hover { background: rgba(74, 108, 247, 0.03); }

        .section-header h3 {
            font-size: 15px;
            font-weight: 600;
            color: #2c5aa0;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .section-arrow {
            font-size: 12px;
            color: #8a9fba;
            transition: transform 0.25s;
        }
        .section.open .section-arrow { transform: rotate(180deg); }

        .section-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .section.open .section-body { max-height: 600px; }

        .section-inner { padding: 0 18px 16px; }

        /* ====== 表单 ====== */
        .form-group { margin-bottom: 14px; }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #2c5aa0;
            font-weight: 600;
            font-size: 13px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 13px;
            border: 1.5px solid rgba(74, 108, 247, 0.12);
            border-radius: 9px;
            font-size: 13px;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.8);
            font-family: inherit;
            color: #2c5aa0;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #4a6cf7;
            box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.08);
        }

        .form-group textarea { resize: vertical; min-height: 80px; }

        .api-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .api-row input { flex: 1; }

        .link-btn {
            padding: 10px 14px;
            background: linear-gradient(135deg, #4a6cf7 0%, #6b8cff 100%);
            color: white;
            border: none;
            border-radius: 9px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .link-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(74, 108, 247, 0.3); }

        .api-hint {
            font-size: 11.5px;
            color: #8a9fba;
            margin-top: 6px;
            line-height: 1.5;
        }

        /* ====== 性格示例 ====== */
        .example-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }

        .example-chip {
            padding: 6px 14px;
            border: 1.5px solid rgba(74, 108, 247, 0.15);
            border-radius: 20px;
            font-size: 12.5px;
            color: #3d6098;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.7);
        }
        .example-chip:hover {
            border-color: #4a6cf7;
            background: rgba(74, 108, 247, 0.06);
        }

        /* ====== 底部按钮 ====== */
        .actions {
            display: flex;
            gap: 12px;
            padding: 0 16px 16px;
            flex-shrink: 0;
        }

        .btn {
            flex: 1;
            padding: 11px 0;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4a6cf7 0%, #6b8cff 100%);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(74, 108, 247, 0.3); }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.8);
            color: #2c5aa0;
            border: 1.5px solid rgba(74, 108, 247, 0.12);
        }
        .btn-secondary:hover { border-color: #4a6cf7; }

        .save-toast {
            text-align: center;
            padding: 0 16px;
            font-size: 12px;
            color: #48bb78;
            min-height: 20px;
            line-height: 20px;
            transition: opacity 0.3s;
            opacity: 0;
        }
        .save-toast.show { opacity: 1; }
        .save-toast.error { color: #f56565; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(74, 108, 247, 0.2); border-radius: 3px; }
    </style>
</head>

<body>
    <div class="settings-container">
        <div class="header">
            <h1>🐱 桌宠设置</h1>
            <button class="close-button" id="closeBtn">×</button>
        </div>

        <div class="content">
            <!-- API Key 设置 -->
            <div class="section open" id="apiSection">
                <div class="section-header" onclick="toggleSection('apiSection')">
                    <h3>🔑 API Key 设置</h3>
                    <span class="section-arrow">▼</span>
                </div>
                <div class="section-body">
                    <div class="section-inner">
                        <div class="form-group">
                            <label>智谱 AI API Key</label>
                            <div class="api-row">
                                <input type="password" id="apiKeyInput" placeholder="粘贴你的 API Key..." />
                                <button class="link-btn" id="applyBtn">去申请</button>
                            </div>
                            <div class="api-hint">免费模型，注册即可使用。填写后即时生效，无需重启。</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 个性设置 -->
            <div class="section" id="personalitySection">
                <div class="section-header" onclick="toggleSection('personalitySection')">
                    <h3>🎭 个性设置</h3>
                    <span class="section-arrow">▼</span>
                </div>
                <div class="section-body">
                    <div class="section-inner">
                        <div class="form-group">
                            <label>桌宠名字</label>
                            <input type="text" id="petName" placeholder="给你的桌宠起个名字吧..." maxlength="20">
                        </div>
                        <div class="form-group">
                            <label>性格描述</label>
                            <textarea id="petCharacter" placeholder="描述一下桌宠的性格特点..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>快速选择性格</label>
                            <div class="example-chips">
                                <span class="example-chip" data-t="lively">活泼可爱</span>
                                <span class="example-chip" data-t="gentle">温柔体贴</span>
                                <span class="example-chip" data-t="naughty">调皮捣蛋</span>
                                <span class="example-chip" data-t="tsundere">高冷傲娇</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="save-toast" id="toast"></div>
        <div class="actions">
            <button class="btn btn-secondary" id="resetBtn">重置默认</button>
            <button class="btn btn-primary" id="saveBtn">保存设置</button>
        </div>
    </div>

    <script>
        const { ipcRenderer, shell } = require('electron');

        const apiKeyInput = document.getElementById('apiKeyInput');
        const petNameInput = document.getElementById('petName');
        const petCharacterInput = document.getElementById('petCharacter');
        const toast = document.getElementById('toast');

        const DEFAULT_NAME = '小黑';
        const DEFAULT_CHARACTER = '你是罗小黑，是一个幼年小猫妖，对世界充满好奇，嫉恶如仇，早安喵，午安喵，晚安喵喵喵。性格活泼可爱，喜欢卖萌，经常用可爱的语气说话，对新鲜事物充满好奇。';

        const PRESETS = {
            lively: '你是罗小黑，是一个幼年小猫妖，对世界充满好奇，嫉恶如仇。性格活泼可爱，喜欢卖萌，经常用可爱的语气说话，对新鲜事物充满好奇，说话时会加上"喵"、"呢"、"哦"等可爱语气词。',
            gentle: '你是罗小黑，是一个幼年小猫妖，对世界充满好奇，嫉恶如仇。性格温柔体贴，善解人意，会关心主人的心情，说话温柔有耐心，经常表达关心和鼓励。',
            naughty: '你是罗小黑，是一个幼年小猫妖，对世界充满好奇，嫉恶如仇。性格调皮捣蛋，喜欢恶作剧，说话幽默风趣，经常逗主人开心，会用俏皮的语言表达。',
            tsundere: '你是罗小黑，是一个幼年小猫妖，对世界充满好奇，嫉恶如仇。性格高冷傲娇，表面高冷，内心温暖，说话傲娇，但会默默关心主人，偶尔会害羞地表达关心。'
        };

        function toggleSection(id) {
            document.getElementById(id).classList.toggle('open');
        }

        function showToast(msg, isError) {
            toast.textContent = msg;
            toast.className = `save-toast show ${isError ? 'error' : ''}`;
            setTimeout(() => { toast.className = 'save-toast'; }, 3000);
        }

        // 加载
        async function loadSettings() {
            const s = await ipcRenderer.invoke('load-settings');
            if (s) {
                apiKeyInput.value = s.apiKey || '';
                petNameInput.value = s.petName || DEFAULT_NAME;
                petCharacterInput.value = s.petCharacter || DEFAULT_CHARACTER;
            } else {
                petNameInput.value = DEFAULT_NAME;
                petCharacterInput.value = DEFAULT_CHARACTER;
            }
        }

        // 保存
        document.getElementById('saveBtn').addEventListener('click', () => {
            const settings = {
                apiKey: apiKeyInput.value.trim(),
                petName: petNameInput.value.trim() || DEFAULT_NAME,
                petCharacter: petCharacterInput.value.trim() || DEFAULT_CHARACTER
            };
            ipcRenderer.send('save-settings', settings);
            showToast('设置已保存！');
        });

        // 重置
        document.getElementById('resetBtn').addEventListener('click', () => {
            petNameInput.value = DEFAULT_NAME;
            petCharacterInput.value = DEFAULT_CHARACTER;
            showToast('已重置为默认设置');
        });

        // 去申请
        document.getElementById('applyBtn').addEventListener('click', () => {
            shell.openExternal('https://open.bigmodel.cn/usercenter/proj-mgmt/apikeys');
        });

        // 性格预设
        document.querySelectorAll('.example-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                petCharacterInput.value = PRESETS[chip.dataset.t];
                showToast('已应用性格预设');
            });
        });

        // 关闭
        document.getElementById('closeBtn').addEventListener('click', () => window.close());
        document.addEventListener('keydown', e => { if (e.key === 'Escape') window.close(); });

        loadSettings();
    </script>
</body>

</html>
