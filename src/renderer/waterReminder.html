<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>喝水提醒</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      -webkit-app-region: drag;
      /* 允许拖动窗口 */
    }

    .reminder-container {
      text-align: center;
      padding: 20px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      border: 1px solid #eee;
      width: 580px;
      height: 460px;
      position: relative;
      overflow: hidden;
    }

    .main-image {
      width: 160px;
      height: 180px;
      object-fit: contain;
      display: block;
      margin: 0 auto 10px;
      transition: transform 0.2s ease;
      position: relative;
      z-index: 2;
      -webkit-app-region: no-drag;
    }

    .message {
      font-size: 16px;
      color: #333;
      margin: 0 0 15px 0;
      transition: transform 0.2s ease;
      position: relative;
      z-index: 2;
      -webkit-app-region: no-drag;
    }

    /* 独立的按钮层，脱离容器裁剪限制，可越界移动 */
    .buttons-layer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 80px;
      display: flex;
      justify-content: center;
      gap: 20px;
      /* 增加按钮间距，避免重叠 */
      z-index: 99999;
      /* 远高于容器与系统遮罩 */
      pointer-events: none;
      /* 层不拦截事件 */
    }

    .buttons-layer .action-button {
      pointer-events: auto;
    }

    .buttons-layer .action-button {
      -webkit-app-region: no-drag;
    }

    .buttons-layer .action-button.cancel {
      transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1), background 0.2s;
      will-change: transform;
    }

    .action-button {
      background: #4a6cf7;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
      color: white;
    }

    .action-button:hover {
      background: #3a5ce5;
      transform: scale(1.05);
    }

    .action-button.cancel {
      background: #f0f0f0;
      color: #666;
    }

    .action-button.cancel:hover {
      background: #e0e0e0;
    }

    .yes-screen {
      width: 420px;
      height: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      border: 1px solid #eee;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .yes-screen.show {
      opacity: 1;
      visibility: visible;
    }

    .reminder-container.hidden {
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .buttons-layer.hidden {
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    /* 成功画面按钮层 */
    .success-buttons-layer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 80px;
      display: flex;
      justify-content: center;
      gap: 10px;
      z-index: 99999;
      pointer-events: none;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .success-buttons-layer .action-button {
      pointer-events: auto;
      -webkit-app-region: no-drag;
    }

    .success-buttons-layer.show {
      opacity: 1;
      visibility: visible;
    }

    .yes-text {
      font-size: 18px;
      margin: 40px 0 12px;
      color: #333;
    }

    .yes-image {
      width: 200px;
      height: 200px;
      object-fit: contain;
    }

    /* 水波层 */
    .water-layer {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 14%;
      background: linear-gradient(180deg, rgba(74, 108, 247, 0.28) 0%, rgba(74, 108, 247, 0.42) 100%);
      transition: height 0.4s ease;
      overflow: hidden;
      z-index: 1;
      pointer-events: none;
    }

    .water-wave {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 200%;
      height: 60px;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M0,49 C150,149 350,-49 600,49 C850,149 1050,-49 1200,49 L1200,120 L0,120 Z" fill="%23ffffff55"/></svg>') repeat-x;
      background-size: 50% 60px;
      animation: wave 4s linear infinite;
      opacity: 0.5;
    }

    @keyframes wave {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    /* 顶部关闭按钮 */
    .close-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #f3f3f3;
      border: 1px solid #e5e5e5;
      color: #666;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      font-weight: bold;
      z-index: 3;
      -webkit-app-region: no-drag;
    }

    .close-btn:hover {
      background: #e9e9e9;
    }
  </style>
</head>

<body>
  <div class="reminder-container">
    <button class="close-btn" id="close">×</button>
    <img id="mainImage" class="main-image" src="" alt="reminder">
    <p class="message" id="question">该喝水啦！</p>
    <div class="water-layer" id="water">
      <div class="water-wave"></div>
    </div>
  </div>
  <div class="buttons-layer">
    <button class="action-button" id="yes" style="transform-origin:center">好，喝水</button>
    <button class="action-button cancel" id="no" style="transform-origin:left">不喝</button>
  </div>

  <!-- 成功画面 -->
  <div class="yes-screen" id="yesScreen">
    <h1 class="yes-text" id="successText">喝水最健康！💧</h1>
    <img id="successImage" src="" alt="good" class="yes-image">
  </div>

  <!-- 成功画面按钮层 -->
  <div class="success-buttons-layer" id="successButtonsLayer">
    <button class="action-button cancel" id="dismissBtn">退下吧</button>
  </div>

  <script>
    const yesButton = document.getElementById("yes");
    const noButton = document.getElementById("no");
    const questionText = document.getElementById("question");
    const mainImage = document.getElementById("mainImage");
    const water = document.getElementById("water");
    const closeBtn = document.getElementById("close");
    const yesScreen = document.getElementById("yesScreen");
    const successText = document.getElementById("successText");
    const dismissBtn = document.getElementById("dismissBtn");
    const reminderContainer = document.querySelector(".reminder-container");
    const buttonsLayer = document.querySelector(".buttons-layer");
    const successButtonsLayer = document.getElementById("successButtonsLayer");

    const params = new URLSearchParams(window.location.search);
    let username = params.get("name");
    const maxLength = 20;
    const safeUsername = username ? username.substring(0, maxLength) : "";

    let charAssets = null;
    let waterUI = null;
    let noTexts = [];
    let emotionGradient = [];
    let wrAssetsBase = '';

    function wrAssetPath(filename) {
      const baseDir = charAssets ? charAssets.baseDir : '罗小黑的生活';
      if (wrAssetsBase) return `file:///${wrAssetsBase}/${baseDir}/${filename}`;
      return `../assets/imgs/${baseDir}/${filename}`;
    }

    (async function initWaterReminder() {
      try {
        const { ipcRenderer: wrIpc } = require('electron');
        const c = await wrIpc.invoke('get-character-config');
        if (c) {
          charAssets = c.assets;
          wrAssetsBase = c.assetsBasePath || '';
          waterUI = c.waterReminderUI;
          noTexts = waterUI.noTexts;
          emotionGradient = charAssets.waterReminder.emotionGradient;

          mainImage.src = wrAssetPath(charAssets.waterReminder.mainImage);
          document.getElementById('successImage').src = wrAssetPath(charAssets.waterReminder.successImage);

          if (safeUsername) {
            questionText.innerText = waterUI.questionWithName.replace(/\{\{username\}\}/g, safeUsername);
          } else {
            questionText.innerText = waterUI.defaultQuestion;
          }

          yesButton.innerText = waterUI.yesButtonText;
          noButton.innerText = waterUI.noButtonText;
          dismissBtn.innerText = waterUI.dismissText;
        }
      } catch (_) {
        noTexts = ["？你认真的吗…","要不再想想？","不许选这个！","我会很伤心…","不行:(","再给个面子嘛~","真的不行！","拜托啦~","喝口再走～","就一小口！"];
        if (safeUsername) questionText.innerText = `该喝水啦，${safeUsername}！`;
      }
    })();

    let clickCount = 0;

    function updateExpressionByClicks(n) {
      if (emotionGradient.length > 0) {
        for (const step of emotionGradient) {
          if (step.maxClicks === null || n <= step.maxClicks) {
            mainImage.src = wrAssetPath(step.image);
            return;
          }
        }
      }
    }

    // No 按钮点击事件（按钮变小直到消失）
    noButton.addEventListener("click", function () {
      clickCount++;

      // 让 Yes 逐步变大（更柔和）
      const yesSize = Math.min(1 + clickCount * 0.18, 2.3);
      yesButton.style.transform = `scale(${yesSize})`;

      // 让 No 按钮逐步变小，最小保持20%大小避免文字看不清
      const noScale = Math.max(1 - clickCount * 0.15, 0.2); // 每次点击缩小15%，最小到0.2
      noButton.style.transform = `scale(${noScale})`;

      // 动态调整按钮间距，避免重叠
      const dynamicGap = Math.max(20 + clickCount * 15, 50); // 基础20px + 每次点击增加15px，最小50px
      buttonsLayer.style.gap = `${dynamicGap}px`;

      // 让图片和文字保持原位，不随水位上升
      mainImage.style.transform = 'translateY(0)';
      questionText.style.transform = 'translateY(0)';

      // 文案渐变（最多 10 次）
      if (clickCount <= noTexts.length) {
        noButton.innerText = noTexts[clickCount - 1];
      }

      // 表情渐变
      updateExpressionByClicks(clickCount);

      // 去掉水位上升逻辑，维持固定浅水装饰

      if (clickCount >= 10) {
        questionText.innerText = waterUI ? waterUI.finalQuestion : '啊我死了…快喝水！';
        yesButton.innerText = waterUI ? waterUI.finalYesText : '复活';

        // 完全隐藏No按钮
        noButton.style.opacity = '0';
        noButton.style.pointerEvents = 'none';
      }
    });

    // Yes 按钮点击后，显示成功画面
    yesButton.addEventListener("click", function () {
      const baseSuccessMsg = waterUI ? waterUI.successText : '喝水最健康！💧';
      const successMessage = `${baseSuccessMsg} ${safeUsername ? safeUsername : ''}`.trim();
      successText.textContent = successMessage;

      // 隐藏原始内容
      reminderContainer.classList.add('hidden');
      buttonsLayer.classList.add('hidden');

      // 显示成功画面和按钮层
      yesScreen.classList.add('show');
      successButtonsLayer.classList.add('show');
    });

    // "退下吧"按钮点击事件
    dismissBtn.addEventListener("click", function () {
      const { ipcRenderer } = require('electron');
      ipcRenderer.send('water-confirmed');
      window.close();
    });

    // 右上角关闭按钮 = 稍后提醒
    closeBtn.addEventListener('click', () => {
      const { ipcRenderer } = require('electron');
      ipcRenderer.send('water-delayed');
      window.close();
    });
  </script>
</body>

</html>
