<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>和小黑聊天</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', Roboto, sans-serif;
            background: #f5f6f8;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        .chat-header {
            background: #2c3e50;
            color: white;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            -webkit-app-region: drag;
            flex-shrink: 0;
        }

        .chat-header-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-name {
            font-size: 14px;
            font-weight: 600;
        }

        .chat-header-status {
            font-size: 11px;
            color: #95a5a6;
        }

        .chat-header-actions {
            display: flex;
            gap: 8px;
            -webkit-app-region: no-drag;
        }

        .header-btn {
            background: none;
            border: none;
            color: #95a5a6;
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .header-btn:hover {
            color: white;
            background: rgba(255, 255, 255, 0.1);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 2px;
        }

        .message-row {
            display: flex;
            gap: 8px;
            max-width: 85%;
            animation: msgIn 0.3s ease-out;
        }

        .message-row.pet {
            align-self: flex-start;
        }

        .message-row.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            flex-shrink: 0;
            object-fit: cover;
        }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 13px;
            line-height: 1.5;
            word-break: break-word;
            user-select: text;
        }

        .message-row.pet .message-bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
        }

        .message-row.user .message-bubble {
            background: #3498db;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-time {
            font-size: 10px;
            color: #999;
            text-align: center;
            padding: 4px 0;
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            gap: 8px;
            max-width: 85%;
        }

        .typing-indicator.show {
            display: flex;
        }

        .typing-dots {
            background: white;
            padding: 10px 14px;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            background: #999;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
        .typing-dots span:nth-child(3) { animation-delay: 0s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .chat-input-area {
            background: white;
            border-top: 1px solid #e8e8e8;
            padding: 12px;
            display: flex;
            gap: 8px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .chat-input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            resize: none;
            max-height: 80px;
            line-height: 1.4;
            transition: border-color 0.2s;
        }

        .chat-input:focus {
            border-color: #3498db;
        }

        .chat-input::placeholder {
            color: #bbb;
        }

        .send-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #3498db;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
            font-size: 16px;
        }

        .send-btn:hover {
            background: #2980b9;
            transform: scale(1.05);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
        }

        .welcome-message {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 12px;
        }

        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="chat-header">
        <img class="chat-header-avatar" src="../assets/imgs/罗小黑的生活/pet.gif" alt="小黑">
        <div class="chat-header-info">
            <div class="chat-header-name" id="petName">小黑</div>
            <div class="chat-header-status">在线 · 随时陪你聊天</div>
        </div>
        <div class="chat-header-actions">
            <button class="header-btn" id="clearBtn" title="清空聊天">🗑️</button>
            <button class="header-btn" id="closeBtn" title="关闭">✕</button>
        </div>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="welcome-message">开始和小黑聊天吧～</div>
    </div>

    <div class="typing-indicator" id="typingIndicator">
        <img class="message-avatar" src="../assets/imgs/罗小黑的生活/pet.gif" alt="小黑">
        <div class="typing-dots">
            <span></span><span></span><span></span>
        </div>
    </div>

    <div class="chat-input-area">
        <textarea class="chat-input" id="chatInput" placeholder="说点什么吧…" rows="1"></textarea>
        <button class="send-btn" id="sendBtn" title="发送">➤</button>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');
        const closeBtn = document.getElementById('closeBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        const petNameEl = document.getElementById('petName');

        let isSending = false;

        ipcRenderer.on('set-pet-name', (event, name) => {
            petNameEl.textContent = name;
        });

        ipcRenderer.on('chat-restore-history', (event, messages) => {
            const welcome = chatMessages.querySelector('.welcome-message');
            if (welcome) welcome.remove();
            messages.forEach(msg => appendMessage(msg.role, msg.text, false));
            scrollToBottom();
        });

        // 自动调整输入框高度
        chatInput.addEventListener('input', () => {
            chatInput.style.height = 'auto';
            chatInput.style.height = Math.min(chatInput.scrollHeight, 80) + 'px';
        });

        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        clearBtn.addEventListener('click', () => {
            chatMessages.innerHTML = '<div class="welcome-message">聊天记录已清空，重新开始吧～</div>';
            ipcRenderer.send('clear-chat-history');
        });

        closeBtn.addEventListener('click', () => {
            window.close();
        });

        function sendMessage() {
            const text = chatInput.value.trim();
            if (!text || isSending) return;

            isSending = true;
            sendBtn.disabled = true;

            // 清除欢迎消息
            const welcome = chatMessages.querySelector('.welcome-message');
            if (welcome) welcome.remove();

            appendMessage('user', text);
            chatInput.value = '';
            chatInput.style.height = 'auto';

            typingIndicator.classList.add('show');
            scrollToBottom();

            ipcRenderer.send('chat-send-message', text);
        }

        ipcRenderer.on('chat-reply', (event, reply) => {
            typingIndicator.classList.remove('show');
            appendMessage('pet', reply);
            isSending = false;
            sendBtn.disabled = false;
            chatInput.focus();
        });

        function appendMessage(role, text, animate = true) {
            const row = document.createElement('div');
            row.className = `message-row ${role}`;
            if (!animate) row.style.animation = 'none';

            const avatarSrc = role === 'pet'
                ? '../assets/imgs/罗小黑的生活/pet.gif'
                : '';

            if (role === 'pet') {
                row.innerHTML = `
                    <img class="message-avatar" src="${avatarSrc}" alt="小黑">
                    <div class="message-bubble">${escapeHtml(text)}</div>
                `;
            } else {
                row.innerHTML = `
                    <div class="message-bubble">${escapeHtml(text)}</div>
                `;
            }

            chatMessages.appendChild(row);
            scrollToBottom();
        }

        function scrollToBottom() {
            requestAnimationFrame(() => {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        chatInput.focus();
    </script>
</body>

</html>
