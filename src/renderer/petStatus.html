<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Pet Status</title>
    <style>
        html {
            overflow: hidden;
        }

        body {
            margin: 0;
            padding: 14px;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            overflow: visible;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
            -webkit-app-region: no-drag;
            user-select: none;
        }

        .status-popup {
            background: #2c3e50;
            border-radius: 22px;
            padding: 14px 18px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.18);
            border: none;
            width: 180px;
            text-align: left;
            animation: bubbleIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            color: white;
        }

        /* 大气泡 */
        .status-popup::before {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            background: #2c3e50;
            border-radius: 50%;
            bottom: -10px;
            right: 22px;
        }

        /* 小气泡 */
        .status-popup::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            background: #2c3e50;
            border-radius: 50%;
            bottom: -18px;
            right: 16px;
        }

        /* 气泡在桌宠下方 */
        .status-popup.bubble-bottom::before {
            bottom: auto;
            top: -10px;
        }
        .status-popup.bubble-bottom::after {
            bottom: auto;
            top: -18px;
        }

        /* 气泡在桌宠左侧 */
        .status-popup.bubble-left::before {
            bottom: 8px;
            right: -12px;
            left: auto;
        }
        .status-popup.bubble-left::after {
            bottom: 2px;
            right: -20px;
            left: auto;
        }

        /* 气泡在桌宠右侧 */
        .status-popup.bubble-right::before {
            bottom: 8px;
            left: -12px;
            right: auto;
        }
        .status-popup.bubble-right::after {
            bottom: 2px;
            left: -20px;
            right: auto;
        }

        .status-message {
            font-size: 13px;
            color: #ecf0f1;
            margin: 0;
            line-height: 1.4;
        }

        @keyframes bubbleIn {
            from {
                opacity: 0;
                transform: scale(0.6);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: translateY(0) scale(1);
            }

            to {
                opacity: 0;
                transform: translateY(-10px) scale(0.95);
            }
        }

        .fade-out {
            animation: fadeOut 0.3s ease-in forwards;
        }
    </style>
</head>

<body>
    <div class="status-popup" id="statusPopup">
        <div class="status-message" id="statusMessage">今天也要开开心心的哦！✨</div>
    </div>

    <script>
        try {
            const { ipcRenderer } = require('electron');
            const statusMessage = document.getElementById('statusMessage');
            const statusPopup = document.getElementById('statusPopup');

            console.log('Pet status window script loaded successfully');

            // 自动关闭相关变量
            let autoCloseTimer = null;
            let isMouseOver = false;
            let AUTO_CLOSE_DELAY = 5000; // 5秒后自动关闭
            let persistentMode = false; // 持久模式：不因失焦关闭

            // 监听主进程发送的状态消息
            ipcRenderer.on('update-status-message', (event, message) => {
                console.log('Received status message:', message);
                if (statusMessage) {
                    statusMessage.textContent = message;
                }
            });

            // 监听主进程发送的气泡方向
            ipcRenderer.on('set-bubble-direction', (event, direction) => {
                console.log('Received bubble direction:', direction);
                if (statusPopup) {
                    // 移除所有方向类
                    statusPopup.classList.remove('bubble-bottom', 'bubble-left', 'bubble-right');

                    // 添加对应的方向类
                    if (direction === 'bottom') {
                        statusPopup.classList.add('bubble-bottom');
                    } else if (direction === 'left') {
                        statusPopup.classList.add('bubble-left');
                    } else if (direction === 'right') {
                        statusPopup.classList.add('bubble-right');
                    }
                    // 默认是上方，不需要添加类
                }
            });

            // 开始自动关闭计时器
            function startAutoCloseTimer() {
                if (autoCloseTimer) {
                    clearTimeout(autoCloseTimer);
                }
                autoCloseTimer = setTimeout(() => {
                    if (!isMouseOver) {
                        console.log('Auto-closing pet status window');
                        if (statusPopup) {
                            statusPopup.classList.add('fade-out');
                        }
                        setTimeout(() => {
                            window.close();
                        }, 300);
                    }
                }, AUTO_CLOSE_DELAY);
            }

            // 重置自动关闭计时器
            function resetAutoCloseTimer() {
                if (autoCloseTimer) {
                    clearTimeout(autoCloseTimer);
                }
                if (!isMouseOver) {
                    startAutoCloseTimer();
                }
            }

            // 鼠标进入窗口
            document.addEventListener('mouseenter', () => {
                console.log('Mouse entered pet status window');
                isMouseOver = true;
                if (autoCloseTimer) {
                    clearTimeout(autoCloseTimer);
                }
            });

            // 鼠标离开窗口
            document.addEventListener('mouseleave', () => {
                console.log('Mouse left pet status window');
                isMouseOver = false;
                startAutoCloseTimer();
            });

            // 点击窗口关闭
            document.addEventListener('click', () => {
                console.log('Window clicked, closing...');
                window.close();
            });

            // ESC键关闭
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    console.log('ESC pressed, closing...');
                    window.close();
                }
            });

            // 窗口失去焦点时关闭（非持久模式）
            window.addEventListener('blur', () => {
                if (!persistentMode) {
                    console.log('Window lost focus, closing...');
                    window.close();
                }
            });

            // 监听持久模式
            ipcRenderer.on('set-persistent-mode', (event, delay) => {
                persistentMode = true;
                AUTO_CLOSE_DELAY = delay || 15000;
                resetAutoCloseTimer();
            });

            // 开始自动关闭计时器
            startAutoCloseTimer();

            console.log('Event listeners added successfully');
        } catch (error) {
            console.error('Error in pet status window script:', error);
            // 如果出错，显示默认消息
            const statusMessage = document.getElementById('statusMessage');
            if (statusMessage) {
                statusMessage.textContent = '喵～';
            }
        }
    </script>
</body>

</html>
